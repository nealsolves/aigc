name: "Release to PyPI"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-build-isolation -e '.[dev]'
      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=aigc \
            --cov-report=term-missing \
            --cov-report=json \
            --cov-report=xml \
            --cov-fail-under=90
      - name: Lint
        run: flake8 aigc
      - name: Markdown lint
        run: npx markdownlint-cli2 "**/*.md"
      - name: Documentation parity check
        run: python scripts/check_doc_parity.py
      - name: Validate schemas and policies
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          from jsonschema import Draft7Validator, validate
          policy_schema = json.loads(Path("schemas/policy_dsl.schema.json").read_text(encoding="utf-8"))
          Draft7Validator.check_schema(policy_schema)
          print("checked schema: schemas/policy_dsl.schema.json")
          audit_schema = json.loads(Path("schemas/audit_artifact.schema.json").read_text(encoding="utf-8"))
          Draft7Validator.check_schema(audit_schema)
          print("checked schema: schemas/audit_artifact.schema.json")
          for policy_path in Path("policies").glob("*.yaml"):
              policy = yaml.safe_load(policy_path.read_text(encoding="utf-8"))
              validate(policy, policy_schema)
              print(f"validated: {policy_path}")
          PY
      - name: React demo — install, test, and build
        run: |
          npm --prefix demo-app-react ci
          npm --prefix demo-app-react test -- --watchAll=false --ci
          npm --prefix demo-app-react run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build package
        run: python -m build
      - name: Package React demo as release asset
        run: |
          zip -r "aigc-${{ github.ref_name }}-demo-react.zip" demo-app-react \
            --exclude 'demo-app-react/node_modules/*' \
            --exclude 'demo-app-react/dist/*'
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            "aigc-${{ github.ref_name }}-demo-react.zip" \
            --title "${{ github.ref_name }}" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            --verify-tag
