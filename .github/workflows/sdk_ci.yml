name: "AIGC CI"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install --no-build-isolation -e '.[dev]'
      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=aigc \
            --cov-report=term-missing \
            --cov-report=json \
            --cov-report=xml \
            --cov-fail-under=90
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.json
            coverage.xml
          retention-days: 30
      - name: Enforce coverage threshold (90%)
        run: |
          python - <<'PY'
          import json
          import sys

          with open("coverage.json") as f:
              cov = json.load(f)

          total = cov["totals"]["percent_covered"]
          threshold = 90.0

          print(f"Coverage: {total:.2f}%")
          print(f"Threshold: {threshold:.2f}%")

          if total < threshold:
              print(f"❌ Coverage {total:.2f}% is below threshold {threshold:.2f}%")
              sys.exit(1)
          else:
              print(f"✅ Coverage {total:.2f}% meets threshold {threshold:.2f}%")
          PY
      - name: Lint
        run: flake8 aigc
      - name: Golden replay regression tests
        run: |
          python -m pytest \
            tests/test_golden_replay_success.py \
            tests/test_golden_replay_failure.py \
            tests/test_golden_replay_guards.py \
            tests/test_golden_replay_tools.py \
            tests/test_golden_replay_conditions.py \
            tests/test_golden_replay_composition.py \
            tests/test_golden_replay_risk_scoring.py \
            tests/test_golden_replay_signing.py \
            tests/test_audit_artifact_contract.py
      - name: Markdown lint
        run: npx markdownlint-cli2 "**/*.md"
      - name: Validate policies against schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          from jsonschema import Draft7Validator, validate

          policy_schema_path = Path("schemas/policy_dsl.schema.json")
          with open(policy_schema_path, "r", encoding="utf-8") as f:
            policy_schema = json.load(f)
          Draft7Validator.check_schema(policy_schema)
          assert policy_schema.get("$schema") == "http://json-schema.org/draft-07/schema#"

          audit_schema_path = Path("schemas/audit_artifact.schema.json")
          with open(audit_schema_path, "r", encoding="utf-8") as f:
            audit_schema = json.load(f)
          Draft7Validator.check_schema(audit_schema)
          assert audit_schema.get("$schema") == "http://json-schema.org/draft-07/schema#"

          for policy_path in Path("policies").glob("*.yaml"):
            with open(policy_path, "r", encoding="utf-8") as f:
              policy = yaml.safe_load(f)
            validate(policy, policy_schema)
            print(f"validated: {policy_path}")
          PY
