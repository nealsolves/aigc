# Markdown lint configuration for AIGC Governance SDK

# Globs to ignore
ignores:
  - "aigc-env/**"
  - ".venv/**"
  - "venv/**"
  - "node_modules/**"
  - ".git/**"
  - ".claude/**"
  - "demo-app/**"
  - "demo-app-streamlit/**"
  - "demo-app-react/**"
  - "docs/research/**"
  - "docs/audits/**"
  - "docs/superpowers/**"
  - "docs/_archive/**"
  - "docs/dev/**"
  - "docs/plans/**"
  - "docs/prs/**"
  - "build/**"
  - "UNKNOWN-0.0.0/**"
  - "*.egg-info/**"
  - "AIGC_0.3.0_Release_Readiness_Audit.md"

# Rule configuration
config:
  # Allow longer lines for code examples and tables
  MD013:
    line_length: 300
    code_blocks: false
    tables: false

  # Allow headings without surrounding blank lines (common in technical docs)
  MD022: false

  # Allow fenced code blocks without surrounding blank lines
  MD031: false

  # Allow lists without surrounding blank lines
  MD032: false

  # Allow emphasis as heading for special formatting
  MD036: false

  # Allow fenced code blocks without language (for plain text examples)
  MD040: false

  # Allow first line to not be heading (for metadata, etc.)
  MD041: false

  # Allow duplicate headings across different parent sections (required for
  # changelogs where ### Added / ### Fixed / ### Changed repeat per version)
  MD024:
    siblings_only: true

  # Disable table column style enforcement (triggers on standard separator rows)
  MD060: false
