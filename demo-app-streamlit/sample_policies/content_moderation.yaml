policy_version: "1.0"
description: "Content moderation policy — strict enforcement, no risk tolerance"

roles:
  - moderator
  - reviewer

risk:
  mode: "strict"
  threshold: 0.3
  factors:
    - name: "no_output_schema"
      weight: 0.3
      condition: "no_output_schema"
    - name: "missing_guards"
      weight: 0.4
      condition: "missing_guards"
    - name: "external_model"
      weight: 0.3
      condition: "external_model"

pre_conditions:
  required:
    role_declared:
      type: "boolean"
    schema_exists:
      type: "boolean"

post_conditions:
  required:
    - output_schema_valid

output_schema:
  type: object
  properties:
    result:
      type: string
  required:
    - result
