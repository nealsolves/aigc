policy_version: "1.0"
description: "High-risk policy — aggressive blocking at low threshold"

roles:
  - planner
  - synthesizer
  - verifier
  - classifier
  - reviewer

risk:
  mode: "strict"
  threshold: 0.3
  factors:
    - name: "no_output_schema"
      weight: 0.2
      condition: "no_output_schema"
    - name: "broad_roles"
      weight: 0.2
      condition: "broad_roles"
    - name: "missing_guards"
      weight: 0.2
      condition: "missing_guards"
    - name: "external_model"
      weight: 0.2
      condition: "external_model"
    - name: "no_preconditions"
      weight: 0.2
      condition: "no_preconditions"

pre_conditions:
  required:
    role_declared:
      type: "boolean"
    schema_exists:
      type: "boolean"

post_conditions:
  required:
    - output_schema_valid

output_schema:
  type: object
  properties:
    result:
      type: string
  required:
    - result
