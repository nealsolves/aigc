policy_version: "2.0"
description: "Medical AI — low-risk configuration with all safeguards enabled"
effective_date: "2026-01-01"
expiration_date: "2026-12-31"

roles:
  - doctor
  - nurse

conditions:
  is_enterprise:
    type: boolean
    default: false

guards:
  - when:
      condition: "is_enterprise"
    then:
      pre_conditions:
        required:
          enterprise_audit_enabled:
            type: "boolean"

risk:
  mode: "risk_scored"
  threshold: 0.7
  factors:
    - name: "no_output_schema"
      weight: 0.15
      condition: "no_output_schema"
    - name: "broad_roles"
      weight: 0.15
      condition: "broad_roles"
    - name: "missing_guards"
      weight: 0.2
      condition: "missing_guards"
    - name: "external_model"
      weight: 0.3
      condition: "external_model"
    - name: "no_preconditions"
      weight: 0.2
      condition: "no_preconditions"

pre_conditions:
  required:
    role_declared:
      type: "boolean"
    schema_exists:
      type: "boolean"

post_conditions:
  required:
    - output_schema_valid

output_schema:
  type: object
  properties:
    result:
      type: string
  required:
    - result

tools:
  allowed_tools:
    - name: "search_medical_db"
      max_calls: 5
    - name: "lookup_drug_interaction"
      max_calls: 3
