        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .label-mid {
        fill: #a8b8d8;
        font-size: 10px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: middle;
      }

