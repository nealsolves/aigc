    <text class="section mono" x="68" y="96">HOST APPLICATION</text>
    <text class="label" x="157.5" y="132">App / Orchestrator</text>
    <text class="label mono" x="407.5" y="124">@governed</text>
    <text class="detail" x="407.5" y="138" text-anchor="middle">default split / unified opt-out</text>
    <text class="label" x="675" y="124">Model Provider</text>
    <text class="detail" x="675" y="138" text-anchor="middle">OpenAI / Anthropic / local</text>
    <text class="tiny" x="278" y="118" text-anchor="middle">decorated call</text>
