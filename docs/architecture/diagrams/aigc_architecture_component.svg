        stroke: #5a6a9a;
        stroke-width: 1;
      }

      .conn-dim {
        fill: none;
        stroke: #3a4a6a;
        stroke-width: 0.8;
        stroke-dasharray: 4 3;
      }

      .legend-purple {
        stroke: #be95ff;
        stroke-width: 3;
      }

      .legend-dim {
        stroke: #3a4a6a;
        stroke-width: 1;
        stroke-dasharray: 4 3;
      }

      .legend-green {
        stroke: #42be65;
        stroke-width: 3;
      }

      .watermark {
        fill: #2a2a3a;
        font-size: 10px;
        letter-spacing: 0.5px;
      }
