        stroke: #3a5a4a;
        stroke-width: 0.8;
      }

      .artifact-box {
        fill: #1a2818;
        stroke: #42be65;
        stroke-width: 1.2;
      }

      .ops-wrap {
        fill: none;
        stroke: #2a2a3a;
        stroke-width: 1;
      }

      .legend-wrap {
        fill: #0c0e16;
        stroke: #1a1a2a;
        stroke-width: 0.5;
      }

