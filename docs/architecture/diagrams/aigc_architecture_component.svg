<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850">
  <defs>
    <style>
      svg {
        font-family: 'IBM Plex Sans', Arial, sans-serif;
      }

      .mono {
        font-family: 'IBM Plex Mono', 'IBM Plex Sans', Arial, sans-serif;
      }

      .title {
        fill: #0f62fe;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
      }

      .subtitle {
        fill: #878d96;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      .section {
        fill: #878d96;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 1.2px;
      }

      .section-blue {
        fill: #0f62fe;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.2px;
      }

      .group-label {
        fill: #4a5a7a;
        font-size: 8px;
        font-weight: 600;
        letter-spacing: 0.8px;
      }

      .caption {
        fill: #5a6a8a;
        font-size: 8px;
      }

      .tiny {
        fill: #878d96;
        font-size: 7px;
      }

      .label {
