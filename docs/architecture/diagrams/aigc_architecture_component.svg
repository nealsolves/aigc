        font-size: 9px;
        font-weight: 500;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .purple-sub {
        fill: #8a3ffc;
        font-size: 8px;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .green {
