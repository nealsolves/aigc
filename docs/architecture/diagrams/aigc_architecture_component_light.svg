  <text class="label" x="615" y="324">GovernanceSession</text>
  <text class="label" x="794" y="320">SessionPreCallResult</text>
  <text class="sub" x="794" y="334">workflow-bound split token</text>
  <text class="label" x="944" y="324">Workflow DSL</text>
  <text class="sub" x="944" y="338">sequence · budgets · approvals</text>
