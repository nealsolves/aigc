<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860">
  <defs>
    <style>
      svg { font-family: 'IBM Plex Sans', Arial, sans-serif; }
      .mono { font-family: 'IBM Plex Mono', 'IBM Plex Sans', Arial, sans-serif; }
      .title { fill: #0f62fe; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; }
      .subtitle { fill: #697789; font-size: 11px; letter-spacing: 0.4px; }
      .section { fill: #526277; font-size: 9px; font-weight: 700; letter-spacing: 1.1px; }
      .label { fill: #161616; font-size: 11px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .sub { fill: #5f6b7a; font-size: 8px; text-anchor: middle; dominant-baseline: middle; }
      .note { fill: #445163; font-size: 8px; }
      .small { fill: #6c7988; font-size: 7px; }
      .frame { fill: none; stroke: #c5cfdb; stroke-width: 1.1; }
      .host { fill: #ffffff; stroke: #c5cfdb; stroke-width: 1; }
      .workflowWrap { fill: #eef6ff; stroke: #0f62fe; stroke-width: 1.2; }
      .policyWrap { fill: #f6f8fb; stroke: #c5cfdb; stroke-width: 1; }
      .kernelWrap { fill: #f8f4ff; stroke: #8a3ffc; stroke-width: 1.2; }
      .opsWrap { fill: #f6f8fb; stroke: #c5cfdb; stroke-width: 1; }
      .box { fill: #ffffff; stroke: #c5cfdb; stroke-width: 0.9; }
      .boxBlue { fill: #ffffff; stroke: #0f62fe; stroke-width: 1; }
      .boxPurple { fill: #ffffff; stroke: #8a3ffc; stroke-width: 1; }
      .boxGreen { fill: #defbe6; stroke: #42be65; stroke-width: 1; }
      .boxGray { fill: #ffffff; stroke: #c5cfdb; stroke-width: 0.9; }
      .conn { fill: none; stroke: #0f62fe; stroke-width: 1.2; }
      .connDim { fill: none; stroke: #a8b4c4; stroke-width: 1; stroke-dasharray: 4 3; }
      .watermark { fill: #93a0b1; font-size: 10px; letter-spacing: 0.5px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7 z" fill="#0f62fe"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7 z" fill="#a8b4c4"/>
    </marker>
  </defs>

  <rect width="1100" height="860" fill="#ffffff" rx="8"/>

  <text class="title mono" x="52" y="38">AIGC v0.9.0 BETA</text>
  <text class="subtitle mono" x="52" y="56">Component View for the local develop workflow-governance line</text>

  <rect class="frame" x="52" y="84" width="996" height="98" rx="8"/>
  <rect class="frame" x="52" y="204" width="996" height="496" rx="8"/>
  <rect class="frame" x="52" y="722" width="996" height="92" rx="8"/>

  <text class="section mono" x="72" y="104">HOST APPLICATION</text>
  <text class="section mono" x="72" y="224">AIGC SDK v0.9.0 BETA SURFACE</text>
  <text class="section mono" x="72" y="742">BETA ADOPTION + OPERATOR SURFACES</text>

