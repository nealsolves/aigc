  <text class="label" x="264" y="320">PolicyCache</text>
  <text class="label" x="150" y="376">FilePolicyLoader</text>
  <text class="sub" x="150" y="388">or PolicyLoaderBase</text>
  <text class="label" x="264" y="376">JSON Schemas</text>
