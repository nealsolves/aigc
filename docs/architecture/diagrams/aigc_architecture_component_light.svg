  <rect class="boxBlue" x="378" y="304" width="134" height="48" rx="8"/>
  <rect class="boxBlue" x="540" y="304" width="150" height="48" rx="8"/>
  <rect class="boxBlue" x="718" y="304" width="152" height="48" rx="8"/>
  <rect class="boxBlue" x="888" y="304" width="112" height="48" rx="8"/>
