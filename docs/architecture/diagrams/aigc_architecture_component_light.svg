  <text class="sub" x="755" y="546">pre_call / post_call</text>
  <text class="label" x="928" y="532">ordered gates</text>
  <text class="sub" x="928" y="546">auth -> output -> risk</text>
  <path class="conn" d="M510 538 L528 538" marker-end="url(#arrow)"/>
  <path class="conn" d="M654 538 L672 538" marker-end="url(#arrow)"/>
  <path class="conn" d="M838 538 L856 538" marker-end="url(#arrow)"/>

  <rect class="boxPurple" x="392" y="580" width="608" height="34" rx="8"/>
  <text class="label" x="696" y="597">pre_authorization -> guards -> role -> preconditions -> tools -> post_authorization -> pre_output -> schema -> postconditions -> post_output -> risk</text>

  <rect class="boxGreen" x="82" y="476" width="248" height="56" rx="8"/>
  <rect class="boxGreen" x="82" y="548" width="248" height="56" rx="8"/>
  <rect class="boxGray" x="82" y="620" width="248" height="56" rx="8"/>
  <text class="label" x="206" y="495">Invocation artifact</text>
  <text class="sub" x="206" y="509">PASS or FAIL per invocation attempt</text>
  <text class="label" x="206" y="567">AuditSink + signing</text>
  <text class="sub" x="206" y="581">JSONL · callback · custom · optional signer</text>
  <text class="label" x="206" y="639">Stored-trail analysis</text>
  <text class="sub" x="206" y="653">AuditLineage / compliance export --lineage</text>

  <path class="conn" d="M200 160 L200 476" marker-end="url(#arrow)"/>
  <path class="conn" d="M316 139 L444 516" marker-end="url(#arrow)"/>
  <path class="conn" d="M594 139 L755 516" marker-end="url(#arrow)"/>
  <path class="conn" d="M690 328 L672 538" marker-end="url(#arrow)"/>
  <path class="conn" d="M1000 538 L1000 507 L330 507" marker-end="url(#arrow)"/>
  <path class="conn" d="M330 507 L330 566" marker-end="url(#arrow)"/>
  <path class="conn" d="M726 402 L330 402 L330 638" marker-end="url(#arrow)"/>
  <path class="connDim" d="M330 566 L330 638" marker-end="url(#arrowDim)"/>

  <rect class="opsWrap" x="82" y="754" width="936" height="42" rx="10"/>
  <rect class="box" x="98" y="764" width="176" height="24" rx="6"/>
  <rect class="box" x="292" y="764" width="176" height="24" rx="6"/>
  <rect class="box" x="486" y="764" width="176" height="24" rx="6"/>
  <rect class="box" x="680" y="764" width="322" height="24" rx="6"/>
  <text class="label" x="186" y="776">aigc workflow init</text>
  <text class="label" x="380" y="776">aigc workflow lint</text>
  <text class="label" x="574" y="776">aigc workflow doctor</text>
  <text class="label" x="841" y="776">beta adopter flow + diagnosis around starter/workflow state</text>
  <path class="connDim" d="M186 764 L186 604" marker-end="url(#arrowDim)"/>
  <path class="connDim" d="M380 764 L944 352" marker-end="url(#arrowDim)"/>
  <path class="connDim" d="M574 764 L863 424" marker-end="url(#arrowDim)"/>

  <text class="note mono" x="84" y="414">The host still performs provider and tool calls after AIGC authorizes a step or invocation.</text>
  <text class="note mono" x="84" y="456">The beta adds workflow evidence; it does not collapse AIGC into a hosted orchestrator.</text>
  <text class="small mono" x="84" y="832">Planned-only public items intentionally omitted: AgentIdentity, AgentCapabilityManifest, public ValidatorHook, BedrockTraceAdapter, A2AAdapter, workflow trace/export.</text>
  <text class="watermark mono" x="52" y="848">AIGC v0.9.0 Beta · local develop only · github.com/nealsolves/aigc</text>
</svg>
