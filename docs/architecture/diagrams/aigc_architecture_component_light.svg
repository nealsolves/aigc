  <rect class="boxGray" x="214" y="300" width="100" height="42" rx="8"/>
  <rect class="boxGray" x="98" y="356" width="104" height="42" rx="8"/>
  <rect class="boxGray" x="214" y="356" width="100" height="42" rx="8"/>
