  <rect class="boxPurple" x="528" y="516" width="126" height="44" rx="8"/>
  <rect class="boxPurple" x="672" y="516" width="166" height="44" rx="8"/>
  <rect class="boxPurple" x="856" y="516" width="144" height="44" rx="8"/>
