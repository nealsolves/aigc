  <text class="label" x="863" y="396">Workflow artifact</text>
  <text class="sub" x="863" y="410">COMPLETED · FAILED · CANCELED · INCOMPLETE</text>

  <rect class="kernelWrap" x="356" y="470" width="662" height="164" rx="10"/>
  <text class="section mono" x="376" y="492">INVOCATION ENTRYPOINTS + DETERMINISTIC KERNEL</text>
