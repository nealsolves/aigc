<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430">
  <defs>
    <style>
      svg { font-family: 'IBM Plex Sans', Arial, sans-serif; }
      .mono { font-family: 'IBM Plex Mono', 'IBM Plex Sans', Arial, sans-serif; }
      .title { fill: #0f62fe; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; }
      .subtitle { fill: #697789; font-size: 11px; letter-spacing: 0.4px; }
      .phase { fill: #526277; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
      .label { fill: #161616; font-size: 9px; font-weight: 600; text-anchor: middle; }
      .sub { fill: #5f6b7a; font-size: 8px; text-anchor: middle; }
      .note { fill: #445163; font-size: 8px; }
      .frame { fill: #f6f8fb; stroke: #c5cfdb; stroke-width: 1; }
      .blue { fill: #ffffff; stroke: #0f62fe; stroke-width: 1; }
      .purple { fill: #ffffff; stroke: #8a3ffc; stroke-width: 1; }
      .green { fill: #defbe6; stroke: #42be65; stroke-width: 1; }
      .gray { fill: #ffffff; stroke: #c5cfdb; stroke-width: 1; }
      .conn { fill: none; stroke: #0f62fe; stroke-width: 1.2; }
      .connDim { fill: none; stroke: #a8b4c4; stroke-width: 1; stroke-dasharray: 4 3; }
      .watermark { fill: #93a0b1; font-size: 10px; letter-spacing: 0.5px; }
    </style>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 3.5 L0 7 z" fill="#0f62fe"/>
    </marker>
    <marker id="arrDim" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 3.5 L0 7 z" fill="#a8b4c4"/>
    </marker>
  </defs>

  <rect width="1100" height="430" fill="#ffffff" rx="8"/>

  <text class="title mono" x="40" y="34">AIGC v0.9.0 BETA</text>
  <text class="subtitle mono" x="40" y="50">Workflow-composed enforcement path on local develop</text>

  <text class="phase mono" x="56" y="82">SESSION / STEP ENTRY</text>
  <rect class="green" x="56" y="94" width="98" height="42" rx="20"/>
  <text class="label" x="105" y="112">Open session</text>
  <text class="sub" x="105" y="124">or direct invocation</text>

  <rect class="blue" x="186" y="94" width="132" height="42" rx="8"/>
  <text class="label" x="252" y="112">Session step pre-call</text>
  <text class="sub" x="252" y="124">open_session -> GovernanceSession</text>

  <rect class="gray" x="352" y="94" width="112" height="42" rx="8"/>
  <text class="label" x="408" y="112">Validation + load</text>
  <text class="sub" x="408" y="124">policy + workflow context</text>

  <rect class="purple" x="498" y="94" width="126" height="42" rx="8"/>
  <text class="label" x="561" y="112">pre_authorization</text>
  <text class="sub" x="561" y="124">custom gates</text>

  <rect class="gray" x="658" y="94" width="98" height="42" rx="8"/>
  <text class="label" x="707" y="112">guards + role</text>
  <text class="sub" x="707" y="124">step identity checks</text>

  <rect class="gray" x="790" y="94" width="112" height="42" rx="8"/>
  <text class="label" x="846" y="112">preconditions + tools</text>
  <text class="sub" x="846" y="124">budget-sensitive inputs</text>

  <rect class="purple" x="936" y="94" width="112" height="42" rx="8"/>
  <text class="label" x="992" y="112">post_authorization</text>
  <text class="sub" x="992" y="124">custom gates</text>

  <path class="conn" d="M154 115 L186 115" marker-end="url(#arr)"/>
  <path class="conn" d="M318 115 L352 115" marker-end="url(#arr)"/>
  <path class="conn" d="M464 115 L498 115" marker-end="url(#arr)"/>
  <path class="conn" d="M624 115 L658 115" marker-end="url(#arr)"/>
  <path class="conn" d="M756 115 L790 115" marker-end="url(#arr)"/>
  <path class="conn" d="M902 115 L936 115" marker-end="url(#arr)"/>

  <text class="phase mono" x="56" y="186">HOST CALL BOUNDARY</text>
  <rect class="frame" x="332" y="196" width="430" height="54" rx="10"/>
  <text class="label" x="547" y="218">Host performs provider / tool call after approval</text>
  <text class="sub" x="547" y="232">split and session paths only; AIGC does not own transport execution</text>
  <path class="conn" d="M992 136 L992 170 L547 170 L547 196" marker-end="url(#arr)"/>

  <text class="phase mono" x="56" y="292">POST-CALL + EVIDENCE</text>
  <rect class="purple" x="56" y="304" width="120" height="42" rx="8"/>
  <rect class="gray" x="206" y="304" width="108" height="42" rx="8"/>
  <rect class="gray" x="344" y="304" width="120" height="42" rx="8"/>
  <rect class="purple" x="494" y="304" width="108" height="42" rx="8"/>
  <rect class="green" x="632" y="304" width="122" height="42" rx="20"/>
  <rect class="blue" x="788" y="304" width="164" height="42" rx="8"/>
  <rect class="green" x="982" y="304" width="86" height="42" rx="20"/>

  <text class="label" x="116" y="322">pre_output</text>
  <text class="sub" x="116" y="334">custom + built-in gates</text>
  <text class="label" x="260" y="322">schema</text>
  <text class="sub" x="260" y="334">output validation</text>
  <text class="label" x="404" y="322">postconditions</text>
  <text class="sub" x="404" y="334">post-call checks</text>
  <text class="label" x="548" y="322">post_output</text>
  <text class="sub" x="548" y="334">custom gates</text>
  <text class="label" x="693" y="320">Invocation artifact</text>
  <text class="sub" x="693" y="334">PASS / FAIL</text>
  <text class="label" x="870" y="318">GovernanceSession.enforce_step_post_call()</text>
  <text class="sub" x="870" y="332">updates step state, approvals, budgets, correlations</text>
  <text class="label" x="1025" y="320">Workflow artifact</text>
  <text class="sub" x="1025" y="334">finalize</text>

  <path class="conn" d="M547 250 L547 274 L116 274 L116 304" marker-end="url(#arr)"/>
  <path class="conn" d="M176 325 L206 325" marker-end="url(#arr)"/>
  <path class="conn" d="M314 325 L344 325" marker-end="url(#arr)"/>
  <path class="conn" d="M464 325 L494 325" marker-end="url(#arr)"/>
  <path class="conn" d="M602 325 L632 325" marker-end="url(#arr)"/>
  <path class="conn" d="M754 325 L788 325" marker-end="url(#arr)"/>
  <path class="conn" d="M952 325 L982 325" marker-end="url(#arr)"/>

  <rect class="frame" x="56" y="366" width="464" height="30" rx="8"/>
  <text class="note mono" x="72" y="385">Beta CLI around this path: workflow init for bootstrap, workflow lint for static checks, workflow doctor for runtime/evidence diagnosis.</text>
  <path class="connDim" d="M288 366 L252 136" marker-end="url(#arrDim)"/>
  <path class="connDim" d="M430 366 L1025 346" marker-end="url(#arrDim)"/>

  <text class="watermark mono" x="40" y="416">AIGC v0.9.0 Beta · local develop only · github.com/nealsolves/aigc</text>
</svg>
