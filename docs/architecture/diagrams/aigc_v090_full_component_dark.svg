</marker></defs><rect width="1600" height="1290" fill="#0b1118" rx="24" /><rect x="36" y="36" width="1528" height="1218" class="frame" rx="24" /><text class="page-title mono" x="60" y="44">AIGC v0.9.0 FULL</text><text class="page-subtitle" x="60" y="68">Intended full solution design surface. AIGC remains an SDK, not a hosted runtime or orchestrator.</text><rect x="60" y="72" width="1480" height="138" rx="24" class="band" /><text class="section-tag mono" x="84" y="96">HOST APPLICATION</text><rect x="92" y="116" width="274" height="68" rx="18" class="host-box" /><text class="box-title" x="229" y="136.0" text-anchor="middle">orchestration</text><text class="box-title" x="229" y="164.0" text-anchor="middle">business logic</text><rect x="392" y="116" width="248" height="68" rx="18" class="host-box" /><text class="box-title" x="516" y="136.0" text-anchor="middle">model calls</text><text class="box-title" x="516" y="164.0" text-anchor="middle">tool execution</text><rect x="666" y="116" width="222" height="68" rx="18" class="host-box" /><text class="box-title" x="777" y="136.0" text-anchor="middle">transport</text><text class="box-title" x="777" y="164.0" text-anchor="middle">credentials</text><rect x="914" y="116" width="594" height="68" rx="18" class="note-box" /><text class="body" x="1211" y="140.0" text-anchor="middle">Host-owned execution remains outside AIGC governance surfaces.</text><text class="small" x="1211" y="162.0" text-anchor="middle">Adapters normalize host-visible evidence only; they do not replace core enforcement.</text><rect x="60" y="228" width="1480" height="112" rx="24" class="adapter-panel" /><text class="section-tag mono" x="84" y="252">OPTIONAL ADAPTERS</text><rect x="100" y="264" width="250" height="56" rx="18" class="node-adapter" /><text class="box-title" x="225" y="280.5" text-anchor="middle">Bedrock adapter</text><text class="box-sub" x="225" y="306.0" text-anchor="middle">optional normalization</text><rect x="380" y="264" width="250" height="56" rx="18" class="node-adapter" /><text class="box-title" x="505" y="280.5" text-anchor="middle">A2A adapter</text><text class="box-sub" x="505" y="306.0" text-anchor="middle">optional normalization</text><rect x="676" y="258" width="796" height="68" rx="18" class="note-box" /><text class="body" x="1074" y="282.0" text-anchor="middle">Governance normalization inlet for host-supplied parsed trace, card, and task evidence.</text><text class="small" x="1074" y="304.0" text-anchor="middle">Optional. Does not own HTTP clients, auth flows, retries, sockets, or remote sessions.</text><rect x="60" y="370" width="1480" height="854" rx="24" class="band" /><text class="section-tag mono" x="84" y="394">AIGC SDK v0.9.0 FULL SURFACE</text><rect x="90" y="416" width="1038" height="126" rx="22" class="policy-panel" /><text class="panel-title mono" x="114" y="444">POLICY + CONTRACTS</text><rect x="90" y="566" width="1038" height="232" rx="22" class="workflow-panel" /><text class="panel-title mono" x="114" y="594">WORKFLOW GOVERNANCE LAYER</text><rect x="90" y="822" width="1038" height="204" rx="22" class="kernel-panel" /><text class="panel-title mono" x="114" y="850">INVOCATION GOVERNANCE KERNEL</text><rect x="90" y="1050" width="1038" height="136" rx="22" class="evidence-panel" /><text class="panel-title mono" x="114" y="1078">EVIDENCE OUTPUTS</text><rect x="1156" y="416" width="354" height="770" rx="22" class="ops-panel" /><text class="panel-title mono" x="1180" y="444">VALIDATION + OPERATOR SURFACES</text><rect x="114" y="454" width="220" height="62" rx="18" class="node-policy" /><text class="box-title" x="224" y="485.0" text-anchor="middle">Policy YAML / workflow DSL</text><rect x="354" y="454" width="170" height="62" rx="18" class="node-policy" /><text class="box-title" x="439" y="485.0" text-anchor="middle">JSON Schemas</text><rect x="544" y="454" width="170" height="62" rx="18" class="node-policy" /><text class="box-title" x="629" y="485.0" text-anchor="middle">manifests</text><rect x="734" y="454" width="370" height="62" rx="18" class="node-policy" /><text class="box-title" x="919" y="473.5" text-anchor="middle">policy loading / validation</text><text class="box-sub" x="919" y="499.0" text-anchor="middle">composition, narrowing, and fail-closed checks</text><rect x="114" y="614" width="206" height="72" rx="18" class="node-workflow" /><text class="box-title" x="217" y="650.0" text-anchor="middle">AIGC.open_session(...)</text><rect x="344" y="614" width="206" height="72" rx="18" class="node-workflow" /><text class="box-title" x="447" y="650.0" text-anchor="middle">GovernanceSession</text><rect x="574" y="614" width="206" height="72" rx="18" class="node-workflow" /><text class="box-title" x="677" y="650.0" text-anchor="middle">SessionPreCallResult</text><rect x="114" y="710" width="206" height="64" rx="18" class="node-workflow" /><text class="box-title" x="217" y="742.0" text-anchor="middle">AgentIdentity</text><rect x="344" y="710" width="206" height="64" rx="18" class="node-workflow" /><text class="box-title" x="447" y="742.0" text-anchor="middle">AgentCapabilityManifest</text><rect x="574" y="706" width="530" height="72" rx="18" class="node-workflow" /><text class="box-title" x="839" y="730.5" text-anchor="middle">handoffs, budgets, escalation checkpoints</text><text class="box-sub" x="839" y="756.0" text-anchor="middle">session / workflow evidence correlation</text><rect x="114" y="868" width="180" height="72" rx="18" class="node-kernel" /><text class="box-title" x="204" y="890.0" text-anchor="middle">unified + split</text><text class="box-title" x="204" y="918.0" text-anchor="middle">enforcement</text><rect x="316" y="868" width="180" height="72" rx="18" class="node-kernel" /><text class="box-title" x="406" y="904.0" text-anchor="middle">ordered gates</text><rect x="518" y="868" width="180" height="72" rx="18" class="node-kernel" /><text class="box-title" x="608" y="890.0" text-anchor="middle">pre-call</text><text class="box-title" x="608" y="918.0" text-anchor="middle">authorization</text><rect x="720" y="868" width="180" height="72" rx="18" class="node-kernel" /><text class="box-title" x="810" y="890.0" text-anchor="middle">post-call output</text><text class="box-title" x="810" y="918.0" text-anchor="middle">validation</text><rect x="922" y="868" width="180" height="72" rx="18" class="node-kernel" /><text class="box-title" x="1012" y="904.0" text-anchor="middle">risk</text><rect x="114" y="964" width="988" height="42" rx="18" class="node-kernel" /><text class="body" x="608" y="985.0" text-anchor="middle">pre_authorization -&gt; guards -&gt; role -&gt; preconditions -&gt; tools -&gt; post_authorization -&gt; pre_output -&gt; schema -&gt; postconditions -&gt; post_output -&gt; risk</text><rect x="114" y="1094" width="228" height="64" rx="18" class="node-evidence" /><text class="box-title" x="228" y="1126.0" text-anchor="middle">invocation artifacts</text><rect x="364" y="1094" width="228" height="64" rx="18" class="node-evidence" /><text class="box-title" x="478" y="1126.0" text-anchor="middle">workflow artifacts</text><rect x="614" y="1094" width="228" height="64" rx="18" class="node-evidence" /><text class="box-title" x="728" y="1126.0" text-anchor="middle">AuditSink + signing</text><rect x="864" y="1094" width="238" height="64" rx="18" class="node-evidence" /><text class="box-title" x="983" y="1126.0" text-anchor="middle">operator exports</text><rect x="1182" y="470" width="302" height="80" rx="18" class="node-ops" /><text class="box-title" x="1333" y="498.5" text-anchor="middle">ValidatorHook</text><text class="box-sub" x="1333" y="524.0" text-anchor="middle">typed, versioned extension contract</text><rect x="1182" y="584" width="302" height="72" rx="18" class="node-ops" /><text class="box-title" x="1333" y="608.5" text-anchor="middle">workflow lint</text><text class="box-sub" x="1333" y="634.0" text-anchor="middle">schema, transitions, bindings, budgets</text><rect x="1182" y="682" width="302" height="72" rx="18" class="node-ops" /><text class="box-title" x="1333" y="706.5" text-anchor="middle">workflow trace</text><text class="box-sub" x="1333" y="732.0" text-anchor="middle">timeline reconstruction from emitted evidence</text><rect x="1182" y="780" width="302" height="72" rx="18" class="node-ops" /><text class="box-title" x="1333" y="804.5" text-anchor="middle">workflow export</text><text class="box-sub" x="1333" y="830.0" text-anchor="middle">operator-facing export modes</text><rect x="1182" y="888" width="302" height="104" rx="18" class="note-box" /><text class="body" x="1333" y="930.0" text-anchor="middle">Operator tooling sits beside runtime semantics, not inside the execution path.</text><text class="small" x="1333" y="952.0" text-anchor="middle">The host still performs provider, tool, and transport interactions.</text><rect x="1182" y="1024" width="302" height="112" rx="18" class="note-box" /><text class="body" x="1333" y="1070.0" text-anchor="middle">Trace and export consume emitted invocation and workflow evidence.</text><text class="small" x="1333" y="1092.0" text-anchor="middle">Optional adapters remain optional normalization layers.</text><path class="connector" d="M225 184 V228 H1074 V264" marker-end="url(#arrow)" /><path class="connector" d="M350 292 H676" marker-end="url(#arrow)" /><path class="connector" d="M630 292 H676" marker-end="url(#arrow)" /><path class="connector-muted" d="M1074 326 V742 H1104" marker-end="url(#arrow-muted)" /><path class="connector" d="M919 516 V566" marker-end="url(#arrow)" /><path class="connector" d="M839 778 V822" marker-end="url(#arrow)" /><path class="connector" d="M653 1026 V1050" marker-end="url(#arrow)" /><path class="connector" d="M1104 486 H1140 V510 H1182" marker-end="url(#arrow)" /><path class="connector" d="M1104 742 H1140 V620 H1182" marker-end="url(#arrow)" /><path class="connector-muted" d="M1102 1126 H1140 V1080 H1182" marker-end="url(#arrow-muted)" /><text class="footer-note" x="60" y="1240.0" text-anchor="start">AIGC remains an SDK, not a hosted runtime or orchestrator.</text><text class="footer-note" x="60" y="1262.0" text-anchor="start">Provider, tool, and transport interactions remain host-owned.</text><text class="footer-small" x="60" y="1282.0" text-anchor="start">Workflow governance wraps invocation governance. Optional adapters normalize evidence into governance events; they do not replace the core.</text></svg>
