policy_version: "1.0"
roles:
  - planner
  - verifier

pre_conditions:
  required:
    role_declared:
      type: "boolean"
    schema_exists:
      type: "boolean"

post_conditions:
  required:
    - output_schema_valid

output_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  title: "Typed Policy Output Schema"
  type: object
  properties:
    result:
      type: string
    confidence:
      type: number
  required:
    - result
    - confidence
