policy_version: "1.0"
roles:
  - planner
pre_conditions:
  required:
    role_declared:
      type: boolean
post_conditions:
  required:
    - output_schema_valid
output_schema:
  type: object
  properties:
    result:
      type: string
    confidence:
      type: number
  required:
    - result
    - confidence
tools:
  allowed_tools:
    - name: "search_knowledge_base"
      max_calls: 2
