policy_version: "1.0"
roles:
  - planner
pre_conditions:
  required:
    role_declared:
      type: boolean
    schema_exists:
      type: boolean
post_conditions:
  required:
    - output_schema_valid
output_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    result:
      type: string
  required:
    - result
workflow:
  max_steps: 2
  max_total_tool_calls: 3
