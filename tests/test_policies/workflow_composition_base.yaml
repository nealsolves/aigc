policy_version: "1.0"
roles:
  - planner
  - reviewer
pre_conditions:
  required:
    role_declared:
      type: boolean
    schema_exists:
      type: boolean
post_conditions:
  required:
    - output_schema_valid
output_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    result:
      type: string
  required:
    - result
workflow:
  max_steps: 5
  max_total_tool_calls: 20
  participants:
    - id: agent-1
    - id: agent-2
